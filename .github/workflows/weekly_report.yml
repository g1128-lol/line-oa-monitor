name: 房產LINE好友日報

on:
  schedule:
    # 每天 UTC 02:05 = 台灣時間 11:00
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  send-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Send email report
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
          TO_EMAIL: judy.huang@housefun.com.tw
        run: |
          python - <<'EOF'
          import smtplib, csv, os
          from email.mime.multipart import MIMEMultipart
          from email.mime.text import MIMEText
          from datetime import datetime, timezone, timedelta
          from pathlib import Path

          TW_TZ = timezone(timedelta(hours=8))
          today = datetime.now(TW_TZ).strftime("%Y-%m-%d")

          # 讀取 CSV
          csv_path = Path("data/history.csv")
          rows = []
          with open(csv_path, newline="", encoding="utf-8") as f:
              rows = list(csv.DictReader(f))

          if not rows:
              print("無資料")
              exit(0)

          latest = rows[-1]
          prev = rows[-2] if len(rows) > 1 else None

          BRANDS = [
              ("5168實登", "reg5168"),
              ("5168買屋", "buy5168"),
              ("591房屋",  "f591"),
              ("樂居",     "leju"),
              ("樂屋",     "lehu"),
          ]

          # 建立 HTML 表格
          rows_html = ""
          for name, key in BRANDS:
              val = int(latest.get(key) or 0)
              d = int(latest.get(key) or 0) - int(prev.get(key) or 0) if prev else None
              delta = f"+{d:,}" if d and d >= 0 else (f"{d:,}" if d else "–")
              color = "#16a34a" if d and d >= 0 else "#dc2626"
              rows_html += f"""
              <tr>
                <td style="padding:10px 16px;border-bottom:1px solid #eee">{name}</td>
                <td style="padding:10px 16px;border-bottom:1px solid #eee;text-align:right"><b>{val:,}</b></td>
                <td style="padding:10px 16px;border-bottom:1px solid #eee;text-align:right;color:{color}">{delta}</td>
              </tr>"""

          html = f"""
          <html><body style="font-family:sans-serif;color:#333">
          <h2 style="color:#185FA5">🏠 房產LINE好友日報</h2>
          <p>統計日期：{latest['date']}</p>
          <table style="border-collapse:collapse;width:100%;max-width:500px">
            <tr style="background:#f5f5f5">
              <th style="padding:10px 16px;text-align:left">平台</th>
              <th style="padding:10px 16px;text-align:right">好友數</th>
              <th style="padding:10px 16px;text-align:right">較前日</th>
            </tr>
            {rows_html}
          </table>
          <br>
          <a href="https://yafeng326.github.io/line-oa-monitor/" 
             style="background:#185FA5;color:#fff;padding:10px 20px;border-radius:6px;text-decoration:none">
            查看完整儀表板 →
          </a>
          </body></html>
          """

          msg = MIMEMultipart("alternative")
          msg["Subject"] = f"📊 房產LINE好友日報 {latest['date']}"
          msg["From"] = os.environ["GMAIL_USER"]
          msg["To"] = os.environ["TO_EMAIL"]
          msg.attach(MIMEText(html, "html"))

          with smtplib.SMTP_SSL("smtp.gmail.com", 465) as s:
              s.login(os.environ["GMAIL_USER"], os.environ["GMAIL_PASS"])
              s.send_message(msg)
              print("✅ 郵件發送成功！")
          EOF
